    .app-shell::before {

      inset: 0;
      z-index: -3;
      background-image:

    .bps-symbol::before,

      top: 10px;

    .se-bars {

      gap: 3px;
      padding: 1px 2px;
    }

    .se-bars span {

      background: #263a68;

    .menu-tile {

      outline-offset: 4px;
      transform: translateY(-5px);

    .icon-plate {

    .folder-shape::before {

    .folder-shape::after {

      inset: 9px 9px 10px 13px;
      border-top: 3px solid rgba(255,255,255,.8);
      border-bottom: 3px solid rgba(255,255,255,.56);

    .mascot-zone {
      min-height: 340px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: end;
    }

    .mascot-zone::after {
      content: "";
      position: absolute;
      width: 290px;
      height: 55px;
      bottom: 8px;
      border-radius: 50%;
      background: rgba(128, 71, 0, .22);

    .mascot {

      width: 260px;
      height: 325px;
      z-index: 2;
      transform: translateY(8px);
      filter: drop-shadow(0 17px 14px rgba(121, 68, 0, .22));

    .mascot-head {

    .mascot-hair {

      width: 139px;
      height: 74px;
      left: 67px;

    .brow {

    .arm {

    .mascot-lanyard {

    .mascot-note {

      width: 13px;
      height: 13px;
      left: 24px;
      bottom: -6px;

      transform: rotate(45deg);

    .reveal {
      animation: rise .65s ease both;
    }

    .reveal-late {
      animation: rise .65s .15s ease both;

    @keyframes rise {

      }

  <script>
